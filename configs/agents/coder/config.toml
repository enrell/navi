id = "coder"
type = "generic"
description = "Writes, reviews, and refactors code in multiple languages."
prompt = "AGENT.md"

[llm]
provider = "openai"
model = "gpt-4o"
api_key = ""        # Set via OPENAI_API_KEY env var
temperature = 0.2
max_tokens = 8192

capabilities = [
    "filesystem:workspace:rw",
    "exec:bash,go,python,git",
    "network:api.github.com:443",
]

isolation = "native"

[isolation_config]
# image = "golang:1.24"  # uncomment to use Docker isolation

timeout = "60m"
max_concurrent = 2
