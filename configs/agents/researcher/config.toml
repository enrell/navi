id = "researcher"
type = "generic"
description = "Researches topics using web search and summarizes findings."
prompt = "AGENT.md"

[llm]
provider = "openai"
model = "gpt-4o-mini"
api_key = ""          # Set via OPENAI_API_KEY env var
temperature = 0.5
max_tokens = 4096

capabilities = [
  "network:*:443",
  "filesystem:workspace:rw",
]

isolation = "native"
timeout = "30m"
max_concurrent = 3
